<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<style>

body{

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

background:#F7F4EA;

}

div{

text-align:center;

}

input{

padding:15px;

font-size:20px;

width:250px;

}

button{

padding:15px 25px;

margin-top:15px;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div>

<h2>Buscar Produto</h2>

<input id="codigo" placeholder="Digite o código">

<br><br>

<button onclick="buscar()">

Abrir

</button>

</div>

<script>

function buscar(){

const codigo=document.getElementById("codigo").value;

window.location.href="produto.html?codigo="+codigo;

}

</script>

</body>

</html>
