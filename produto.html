<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#F7F4EA;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

img{

    width:100%;

    max-width:700px;

    display:block;

}

</style>

</head>

<body>

<img id="produto">

<script>

const parametros = new URLSearchParams(window.location.search);

const codigo = parametros.get("codigo");

document.getElementById("produto").src =
"imagens/" + codigo + ".png";

document.getElementById("produto").alt = codigo;

</script>

</body>

</html>
